name: Deploy to Yandex Object Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: pip install awscli

      - name: Sync to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync . s3://kazan-music-history \
            --endpoint-url https://storage.yandexcloud.net \
            --region ru-central1 \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude ".gstack/*" \
            --exclude "local-preview-server.js" \
            --exclude "*.command" \
            --exclude "mockup-*.html" \
            --exclude "options-preview.html" \
            --exclude "*.md.bak"
