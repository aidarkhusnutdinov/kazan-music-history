<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музыкальная жизнь Казани</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #f8f4ec;
      --text: #171717;
      --muted: #7b7368;
      --line: #d7cfc2;
      --card: #fbf8f2;
      --shadow: rgba(40, 30, 20, 0.06);
      --link: #295ea8;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      zoom: 0.9;
    }
    a { color: var(--link); text-decoration: none; border-bottom: 1px solid rgba(41,94,168,.28); }
    a:hover { border-bottom-color: rgba(41,94,168,.8); }
    .page {
      width: min(1200px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 40px 0 96px;
      position: relative;
    }
    .intro {
      max-width: 760px;
      margin: 0 0 48px 120px;
    }
    .eyebrow {
      font: 12px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    h1 {
      font-size: clamp(34px, 5vw, 68px);
      line-height: .98;
      margin: 0 0 16px;
      font-weight: 700;
    }
    .lead {
      font-size: 18px;
      color: #3d3934;
      max-width: 680px;
      margin: 0 0 12px;
    }
    .helper {
      font: 13px/1.45 Arial, sans-serif;
      color: var(--muted);
    }
    .timeline {
      position: relative;
      margin-left: 120px;
      padding-right: 180px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--line);
    }
    .chapter {
      position: relative;
      padding: 0 0 44px 0;
      min-height: 64px;
    }
    .chapter-anchor {
      position: absolute;
      left: 0;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--paper);
      display: grid;
      place-items: center;
      font: 12px/1 Arial, sans-serif;
      color: var(--muted);
      z-index: 2;
    }
    .chapter-date {
      position: absolute;
      left: calc(100% + 56px);
      top: 10px;
      width: 270px;
      padding-left: 20px;
      text-align: left;
      font: 14px/1.35 Arial, sans-serif;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .chapter-date::before {
      content: "";
      position: absolute;
      left: 0;
      top: -10px;
      bottom: -14px;
      width: 1px;
      background: var(--line);
    }
    .date-track {
      display: grid;
      gap: 14px;
    }
    .date-era {
      font: 13px/1.2 Arial, sans-serif;
      letter-spacing: .12em;
      color: #8a8176;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .date-group {
      display: grid;
      gap: 9px;
      padding: 12px 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(215,207,194,.85);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(40,30,20,.04);
    }
    .date-group-label {
      font: 11px/1.2 Arial, sans-serif;
      letter-spacing: .14em;
      color: #8a8176;
      text-transform: uppercase;
    }
    .date-item {
      font: 14px/1.38 Arial, sans-serif;
      text-transform: none;
      letter-spacing: 0;
      color: #4f483f;
    }
    .date-item strong {
      font-weight: 700;
      color: #2f2a24;
    }
    .chapter-body {
      margin-left: 72px;
      max-width: 760px;
    }
    .chapter-title {
      position: absolute;
      left: -210px;
      top: 6px;
      width: 180px;
      font-size: 25px;
      line-height: 1.18;
      margin: 0;
      font-weight: 600;
      color: #2d2924;
    }
    .blocks { display: grid; gap: 14px; }
    .media-strip {
      display: grid;
      gap: 12px;
      margin: 18px 0 18px;
    }
    .media-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .media-card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .media-caption {
      padding: 10px 12px 12px;
      font: 12px/1.35 Arial, sans-serif;
      color: #6b6258;
    }
    .media-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .doc-card {
      padding: 14px;
      background: #f3eee4;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .doc-label {
      font: 10px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .doc-title {
      font-size: 18px;
      line-height: 1.2;
      margin: 0 0 10px;
      font-weight: 700;
    }
    .doc-text {
      font: 14px/1.45 Arial, sans-serif;
      color: #4d453b;
    }
    .video-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.76);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .video-frame {
      aspect-ratio: 16 / 9;
      width: 100%;
      border: 0;
      display: block;
    }
    details.block {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    details.block[open] { background: #fffaf2; }
    details.block summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 22px 52px;
      position: relative;
    }
    details.block summary::-webkit-details-marker { display: none; }
    .block-kicker {
      font: 11px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .block-main {
      font-size: 18px;
      color: #24211d;
      margin: 0;
      white-space: normal;
    }
    .toggle {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid #c4b89e;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s, border-color .18s, box-shadow .18s;
    }
    .toggle svg {
      width: 14px; height: 14px;
      stroke: #7a6a4a;
      stroke-width: 2;
      fill: none;
      transition: transform .22s;
    }
    details.block:not([open]) summary:hover .toggle {
      background: #f0e8d4;
      border-color: #a09070;
      box-shadow: 0 4px 12px rgba(0,0,0,.14);
    }
    details[open] .toggle {
      background: #e8dfc8;
      border-color: #9a8860;
    }
    details[open] .toggle svg { transform: rotate(180deg); }
    details.block[open] summary {
      border-bottom: 1px solid var(--line);
    }
    .expand {
      overflow: hidden;
      padding: 18px 22px 22px;
      background: rgba(255,255,255,.45);
      transition: height .32s cubic-bezier(.4,0,.2,1);
    }
    .expand p { margin: 0; font-size: 17px; white-space: normal; }
    .markdown p { margin: 0 0 10px; }
    .markdown p:last-child { margin-bottom: 0; }
    .error {
      margin-left: 72px;
      padding: 16px 18px;
      background: #fff0ee;
      border: 1px solid #e6b8b1;
      border-radius: 12px;
      color: #7f2a1d;
      font-family: Arial, sans-serif;
    }
    @media (max-width: 920px) {
      .page { width: min(100vw - 24px, 900px); padding-top: 24px; }
      .intro, .timeline { margin-left: 0; padding-right: 0; }
      .timeline::before { left: 14px; }
      .chapter { display: flex; flex-direction: column; }
      .chapter-anchor { order: 0; position: absolute; left: 0; top: 0; }
      .chapter-title {
        order: 1;
        position: static;
        width: auto;
        font-size: clamp(20px, 5.4vw, 30px);
        margin: 0 0 16px 48px;
        min-height: 36px;
        display: flex;
        align-items: center;
      }
      .chapter-body { order: 2; margin-left: 48px; max-width: none; }
      .chapter-date {
        order: 3;
        position: static;
        width: auto;
        margin: 16px 0 0 48px;
        padding-left: 0;
      }
      .chapter-date::before { display: none; }
      .media-grid-2 { grid-template-columns: 1fr; }
      .error { margin-left: 48px; }
    }

    /* ── Интерактив: Школа Гуммерта ── */
    .im-gummert {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
      font-family: Arial, sans-serif;
    }
    .im-gummert-head {
      padding: 20px 22px 18px;
      border-bottom: 1px solid var(--line);
    }
    .im-gummert-kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .im-gummert-title {
      font: 700 20px/1.2 Georgia, serif;
      color: #24211d;
      margin: 0 0 6px;
    }
    .im-gummert-desc {
      font-size: 14px;
      color: #6b6258;
      margin: 0;
      line-height: 1.45;
    }
    .im-gummert-body {
      padding: 32px 22px 36px;
      text-align: center;
    }
    .im-gummert-question {
      font: 700 22px/1.3 Georgia, serif;
      color: #24211d;
      margin: 0 0 28px;
    }
    .im-gummert-btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .im-gummert-btn {
      padding: 12px 32px;
      border-radius: 10px;
      border: 1.5px solid #295ea8;
      background: transparent;
      color: #295ea8;
      font: 600 15px/1.2 Arial, sans-serif;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .im-gummert-btn:hover {
      background: #295ea8;
      color: #fff;
    }
    .im-gummert-end {
      padding: 32px 22px 36px;
      text-align: center;
    }
    .im-gummert-end-title {
      font: 700 22px/1.2 Georgia, serif;
      color: #24211d;
      margin: 0 0 14px;
    }
    .im-gummert-end-text {
      font-size: 16px;
      line-height: 1.65;
      color: #3d3934;
      max-width: 520px;
      margin: 0 auto 24px;
    }
    .im-gummert-restart-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      background: transparent;
      color: #4f483f;
      font: 14px/1.2 Arial, sans-serif;
      cursor: pointer;
    }
    .im-gummert-restart-btn:hover { border-color: #295ea8; color: #295ea8; }
    .embed-widget-strip {
      margin: 18px auto;
      zoom: 1.1111;
      width: 90%;
    }
    .embed-widget-box {
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 18px;
      box-shadow: 0 8px 24px var(--shadow);
      padding: 20px;
    }
    .embed-widget-box iframe {
      display: block;
      width: 100% !important;
      border-radius: 12px;
    }
    .sources {
      margin: 48px 0 0 120px;
      font: 15px/1.55 Arial, sans-serif;
      color: var(--muted);
      max-width: 760px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    /* ── Интерактив: Моң есть или нет? ── */
    .im-mong {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
      font-family: Arial, sans-serif;
    }
    .im-mong-head {
      padding: 20px 22px 18px;
      border-bottom: 1px solid var(--line);
    }
    .im-mong-kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .im-mong-title {
      font: 700 20px/1.2 Georgia, serif;
      color: #24211d;
      margin: 0 0 6px;
    }
    .im-mong-desc {
      font-size: 14px;
      color: #6b6258;
      margin: 0;
      line-height: 1.45;
    }
    .im-mong-body {
      padding: 20px 22px 24px;
    }
    .im-mong-round-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .im-mong-prompt {
      font: 18px/1.35 Georgia, serif;
      color: #24211d;
      margin: 0 0 20px;
    }
    .im-mong-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    @media (max-width: 600px) {
      .im-mong-options { grid-template-columns: 1fr; }
    }
    .im-mong-option {
      border: 1.5px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,.72);
      transition: border-color .15s;
      display: flex;
      flex-direction: column;
    }
    .im-mong-option.chosen {
      border-color: #295ea8;
      background: rgba(41,94,168,.05);
    }
    .im-mong-option.not-chosen {
      opacity: .55;
    }
    .im-mong-option iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16/9;
      border: 0;
    }
    .im-mong-option-label {
      padding: 8px 12px;
      font-size: 13px;
      color: #6b6258;
      font-weight: 600;
    }
    .im-mong-choose-btn {
      padding: 11px 16px;
      margin: 10px 12px 12px;
      border-radius: 10px;
      border: 1.5px solid #295ea8;
      background: transparent;
      color: #295ea8;
      font: 600 14px/1.2 Arial, sans-serif;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .im-mong-choose-btn:hover {
      background: #295ea8;
      color: #fff;
    }
    .im-mong-choose-btn:disabled {
      border-color: var(--line);
      color: var(--muted);
      cursor: default;
      background: transparent;
    }
    .im-mong-reveal {
      padding: 28px 22px 28px;
      text-align: center;
    }
    .im-mong-reveal-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }
    .im-mong-reveal-title {
      font: 700 22px/1.2 Georgia, serif;
      color: #24211d;
      margin: 0 0 14px;
    }
    .im-mong-reveal-text {
      font-size: 16px;
      line-height: 1.6;
      color: #3d3934;
      max-width: 560px;
      margin: 0 auto 22px;
    }
    .im-mong-restart-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      background: transparent;
      color: #4f483f;
      font: 14px/1.2 Arial, sans-serif;
      cursor: pointer;
    }
    .im-mong-restart-btn:hover { border-color: #295ea8; color: #295ea8; }
    .im-mong-chosen-screen {
      padding: 36px 22px 32px;
      text-align: center;
    }
    .im-mong-chosen-heading {
      font: 700 26px/1.2 Georgia, serif;
      color: #24211d;
      margin: 0 0 14px;
    }
    .im-mong-chosen-explanation {
      font: italic 16px/1.6 Georgia, serif;
      color: #7b7368;
      margin: 0 0 28px;
    }
    .im-mong-next-btn {
      padding: 11px 28px;
      border-radius: 10px;
      border: 0;
      background: #295ea8;
      color: #fff;
      font: 600 14px/1.2 Arial, sans-serif;
      cursor: pointer;
    }
    .im-mong-next-btn:hover { background: #1f4a87; }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro">
      <h1>Музыкальная жизнь Казани</h1>
      <p class="lead"></p>
    </section>

    <section class="timeline" id="timeline"></section>
  </main>

  <script>
    let sidebarDatesByChapter = {};
    let mediaPlacementByChapter = {};
    let pendingEmbeds = [];

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function inlineMarkdownToHtml(text) {
      let html = escapeHtml(text);
      html = html.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a target="_blank" rel="noreferrer" href="$2">$1</a>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return html;
    }

    function blockTextToHtml(text) {
      return text
        .split(/\n\s*\n/)
        .map(p => `<p>${inlineMarkdownToHtml(p.trim())}</p>`)
        .join('');
    }

    function stripMarkdown(text) {
      return text
        .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '$1')
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .trim();
    }

    function deriveBlockTitle(block) {
      if (block.title && block.title.trim()) return block.title.trim();
      const plain = stripMarkdown(block.main.replace(/\n+/g, ' '));
      if (!plain) return block.kicker || 'Фрагмент';
      const sentence = plain.match(/^(.{1,90}?[.!?])(\s|$)/);
      if (sentence) return sentence[1].trim();
      return plain.slice(0, 90).trim() + (plain.length > 90 ? '…' : '');
    }

    function normalizeYoutubeEmbed(src) {
      if (!src) return src;
      const s = String(src).trim();
      // Если уже embed, оставляем
      if (s.includes('/embed/')) return s;
      // Извлекаем ID из youtu.be/ или youtube.com/watch?v=
      const m = s.match(/(?:youtu\.be\/|v=|embed\/)([a-zA-Z0-9_-]{11})/);
      if (m && m[1]) return `https://www.youtube.com/embed/${m[1]}`;
      // Если передан чистый ID (11 символов)
      if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return `https://www.youtube.com/embed/${s}`;
      return s;
    }

    function parseSidebarDates(md) {
      const lines = md.split('\n');
      const result = {};
      let currentChapter = null;
      let currentGroup = null;

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          currentChapter = title;
          result[currentChapter] = { era: '', _order: [] };
          currentGroup = null;
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('Эпоха:')) {
          result[currentChapter].era = line.replace('Эпоха:', '').trim();
          continue;
        }
        if (line.startsWith('## ')) {
          currentGroup = line.slice(3).trim();
          if (!result[currentChapter][currentGroup]) {
            result[currentChapter][currentGroup] = [];
            result[currentChapter]._order.push(currentGroup);
          }
          continue;
        }
        if (line.startsWith('- **') && currentGroup && result[currentChapter]) {
          result[currentChapter][currentGroup].push(line.slice(2).trim());
        }
      }

      return result;
    }

    function parseMediaPlacement(md) {
      const lines = md.split('\n');
      const result = {};
      let currentChapter = null;
      let currentItem = null;
      let currentItemsList = null;

      const finishItem = () => {
        if (!currentChapter || !currentItem) return;
        if (!result[currentChapter]) result[currentChapter] = [];
        result[currentChapter].push(currentItem);
        currentItem = null;
        currentItemsList = null;
      };

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          finishItem();
          currentChapter = title;
          if (!result[currentChapter]) result[currentChapter] = [];
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('- **position:**')) {
          finishItem();
          currentItem = { position: line.split('**position:**')[1].trim(), type: '', src: '', caption: '', items: [] };
          continue;
        }
        if (!currentItem) continue;
        if (line.includes('**type:**')) {
          currentItem.type = line.split('**type:**')[1].trim();
          continue;
        }
        if (line.includes('**src:**')) {
          currentItem.src = line.split('**src:**')[1].trim().replace(/^`|`$/g, '');
          continue;
        }
        if (line.includes('**caption:**')) {
          currentItem.caption = line.split('**caption:**')[1].trim();
          continue;
        }
        if (line.includes('**block:**')) {
          currentItem.block = line.split('**block:**')[1].trim();
          continue;
        }
        if (line.includes('**items:**')) {
          currentItemsList = currentItem.items;
          continue;
        }
        if (currentItemsList && line.trim().startsWith('- `')) {
          currentItemsList.push(line.trim().slice(3, -1));
          continue;
        }
        if (line.includes('**html-start:**')) {
          currentItem.embedLines = [];
          continue;
        }
        if (line.includes('**html-end:**')) {
          currentItem.embedHtml = (currentItem.embedLines || []).join('\n');
          delete currentItem.embedLines;
          continue;
        }
        if (currentItem.embedLines !== undefined) {
          currentItem.embedLines.push(raw);
          continue;
        }
      }

      finishItem();
      return result;
    }

    function parseMarkdown(md) {
      const lines = md.split('\n');
      const chapters = [];
      let currentChapter = null;
      let currentBlock = null;
      let mode = null;

      const flushBlock = () => {
        if (!currentBlock || !currentChapter) return;
        currentBlock.main = currentBlock.main.join('\n').trim();
        currentBlock.expand = currentBlock.expand.join('\n').trim();
        currentBlock.title = deriveBlockTitle(currentBlock);
        currentChapter.blocks.push(currentBlock);
        currentBlock = null;
      };

      const flushChapter = () => {
        flushBlock();
        if (currentChapter) chapters.push(currentChapter);
        currentChapter = null;
      };

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          flushChapter();
          currentChapter = { title, blocks: [] };
          mode = null;
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('## ')) {
          flushBlock();
          currentBlock = { kicker: line.slice(3).trim(), title: '', main: [], expand: [] };
          mode = null;
          continue;
        }
        if (!currentBlock) continue;
        if (line.startsWith('### ')) {
          currentBlock.title = line.slice(4).trim();
          mode = 'main';
          continue;
        }
        if (line.startsWith('**Разворот:**')) {
          mode = 'expand';
          const rest = line.replace('**Разворот:**', '').trim();
          if (rest) currentBlock.expand.push(rest);
          continue;
        }
        if (line.trim() === '---') continue;
        if (mode === 'expand') currentBlock.expand.push(line);
        else if (mode === 'main') currentBlock.main.push(line);
      }

      flushChapter();
      return chapters;
    }

    function parseSources(md) {
      const match = md.match(/^#\s+Источники\s*\n([\s\S]*?)(\n---|\n#\s|$)/m);
      if (!match) return null;
      return match[1].trim();
    }

    function renderDateTrack(chapterTitle) {
      const groups = sidebarDatesByChapter[chapterTitle] || {};
      const order = (groups && groups._order) || [];
      return `
        <div class="date-track">
          <div class="date-era">${escapeHtml((groups && groups.era) || '')}</div>
          ${order.map(groupName => {
            const items = groups[groupName] || [];
            if (!items.length) return '';
            return `
              <div class="date-group">
                <div class="date-group-label">${escapeHtml(groupName)}</div>
                ${items.map(item => `<div class="date-item">${inlineMarkdownToHtml(item)}</div>`).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderMediaItem(item) {
      if (!item) return '';
      if (item.type === 'image') {
        return `
          <div class="media-strip">
            <figure class="media-card">
              <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.block || 'Изображение')}" loading="lazy">
              <figcaption class="media-caption">${escapeHtml(item.caption || '')}</figcaption>
            </figure>
          </div>
        `;
      }
      if (item.type === 'youtube') {
        const embedSrc = normalizeYoutubeEmbed(item.src);
        return `
          <div class="media-strip">
            <div class="video-card">
              <iframe class="video-frame" src="${escapeHtml(embedSrc)}" title="${escapeHtml(item.block || 'Видео')}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
              <div class="media-caption">${escapeHtml(item.caption || '')}</div>
            </div>
          </div>
        `;
      }
      if (item.type === 'image-grid') {
        return `
          <div class="media-strip">
            <div class="media-grid-2">
              ${(item.items || []).map(src => `
                <figure class="media-card">
                  <img src="${escapeHtml(src)}" alt="Архивный материал" loading="lazy">
                </figure>
              `).join('')}
            </div>
            ${item.caption ? `<div class="media-caption">${escapeHtml(item.caption)}</div>` : ''}
          </div>
        `;
      }
      if (item.type === 'interactive-mong') {
        return `<div id="interactive-mong" class="im-mong"></div>`;
      }
      if (item.type === 'interactive-gummert') {
        return `<div id="interactive-gummert" class="im-gummert"></div>`;
      }
      if (item.type === 'embed' && item.embedHtml) {
        const id = 'embed-' + Math.random().toString(36).slice(2);
        pendingEmbeds.push({ id, html: item.embedHtml, caption: item.caption || '' });
        return `
          <div class="embed-widget-strip">
            <div class="embed-widget-box" id="${id}"></div>
            ${item.caption ? `<div class="media-caption">${escapeHtml(item.caption)}</div>` : ''}
          </div>
        `;
      }
      return '';
    }

    function activateEmbeds() {
      pendingEmbeds.forEach(({ id, html }) => {
        const container = document.getElementById(id);
        if (!container) return;
        container.innerHTML = html;

        const scripts = Array.from(container.querySelectorAll('script'));
        scripts.forEach(s => s.remove());

        const external = scripts.filter(s => s.src);
        const inline = scripts.filter(s => !s.src);

        const runInline = () => {
          inline.forEach(old => {
            const s = document.createElement('script');
            s.textContent = old.textContent;
            document.head.appendChild(s);
          });
          // После инициализации VK переопределяем ширину iframe
          setTimeout(() => {
            const box = document.getElementById(id);
            if (box) {
              const iframe = box.querySelector('iframe');
              if (iframe) {
                iframe.removeAttribute('width');
                iframe.style.setProperty('width', '100%', 'important');
              }
            }
          }, 1500);
        };

        const loadNext = (queue, done) => {
          if (!queue.length) { done(); return; }
          const old = queue[0];
          // если такой внешний скрипт уже загружен — не грузим повторно
          if (document.querySelector(`script[src="${old.src}"]`)) {
            loadNext(queue.slice(1), done);
            return;
          }
          const s = document.createElement('script');
          s.src = old.src;
          s.onload = () => loadNext(queue.slice(1), done);
          s.onerror = () => loadNext(queue.slice(1), done);
          document.head.appendChild(s);
        };

        loadNext(external, runInline);
      });
      pendingEmbeds = [];
    }

    function renderInlineMedia(chapterTitle, position) {
      const items = mediaPlacementByChapter[chapterTitle] || [];
      return items.filter(item => item.position === position).map(renderMediaItem).join('');
    }

    function initBlockAnimations() {
      document.querySelectorAll('details.block').forEach(details => {
        const summary = details.querySelector('summary');
        const expand = details.querySelector('.expand');

        summary.addEventListener('click', e => {
          e.preventDefault();

          if (details.open) {
            expand.style.height = expand.scrollHeight + 'px';
            requestAnimationFrame(() => {
              requestAnimationFrame(() => { expand.style.height = '0'; });
            });
            expand.addEventListener('transitionend', () => {
              details.removeAttribute('open');
              expand.style.height = '';
            }, { once: true });
          } else {
            details.setAttribute('open', '');
            const h = expand.scrollHeight;
            expand.style.height = '0';
            requestAnimationFrame(() => {
              requestAnimationFrame(() => { expand.style.height = h + 'px'; });
            });
            expand.addEventListener('transitionend', () => {
              expand.style.height = '';
            }, { once: true });
          }
        });
      });
    }

    function render(chapters) {
      const root = document.getElementById('timeline');
      root.innerHTML = chapters.map((chapter, idx) => `
        <article class="chapter">
          <div class="chapter-anchor">${idx + 1}</div>
          <div class="chapter-date">${renderDateTrack(chapter.title)}</div>
          <h2 class="chapter-title">${escapeHtml(chapter.title.replace(/^\d+\.\s*/, ''))}</h2>
          <div class="chapter-body">
            ${renderInlineMedia(chapter.title, 'before-blocks')}
            <div class="blocks">
              ${chapter.blocks.map((block, blockIdx) => `
                <details class="block">
                  <summary>
                    <div class="block-kicker">${escapeHtml(block.title || '')}</div>
                    <div class="block-main markdown">${blockTextToHtml(block.main)}</div>
                    <span class="toggle"><svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg></span>
                  </summary>
                  <div class="expand">
                    <div class="markdown">${blockTextToHtml(block.expand || '')}</div>
                  </div>
                </details>
                ${renderInlineMedia(chapter.title, `after-block-${blockIdx}`)}
              `).join('')}
            </div>
          </div>
        </article>
      `).join('');
    }

    async function init() {
      try {
        const [textRes, datesRes, mediaRes, mongRes, gummertRes] = await Promise.all([
          fetch('./text-draft.md', { cache: 'no-store' }),
          fetch('./chapter-sidebar-dates.md', { cache: 'no-store' }),
          fetch('./media-placement.md', { cache: 'no-store' }),
          fetch('./interactive-mong.md', { cache: 'no-store' }),
          fetch('./interactive-gummert.md', { cache: 'no-store' }),
        ]);
        if (!textRes.ok) throw new Error(`text-draft HTTP ${textRes.status}`);
        if (!datesRes.ok) throw new Error(`chapter-sidebar-dates HTTP ${datesRes.status}`);
        if (!mediaRes.ok) throw new Error(`media-placement HTTP ${mediaRes.status}`);
        if (!mongRes.ok) throw new Error(`interactive-mong HTTP ${mongRes.status}`);
        if (!gummertRes.ok) throw new Error(`interactive-gummert HTTP ${gummertRes.status}`);
        const md = await textRes.text();
        const datesMd = await datesRes.text();
        const mediaMd = await mediaRes.text();
        const mongMd = await mongRes.text();
        const gummertMd = await gummertRes.text();
        sidebarDatesByChapter = parseSidebarDates(datesMd);
        mediaPlacementByChapter = parseMediaPlacement(mediaMd);
        MONG_CONFIG = parseMongConfig(mongMd);
        GUMMERT_CONFIG = parseGummertConfig(gummertMd);
        const chapters = parseMarkdown(md);
        const leadMatch = md.match(/^\*\*lead:\*\*\s*(.+)$/m);
        if (leadMatch) document.querySelector('.lead').textContent = leadMatch[1].trim();
        render(chapters);
        initBlockAnimations();
        activateEmbeds();
        renderMong();
        renderGummert();
        const sources = parseSources(md);
        if (sources) {
          const el = document.createElement('p');
          el.className = 'sources';
          el.textContent = sources;
          document.querySelector('.page').appendChild(el);
        }
      } catch (err) {
        document.getElementById('timeline').innerHTML = `<div class="error">Не удалось загрузить проектные markdown-файлы. Скорее всего, страницу открыли как file:// и браузер заблокировал fetch. Подними локальный сервер в папке проекта и открой страницу через localhost.</div>`;
        console.error(err);
      }
    }

    init();
  </script>

  <script>
    // ── Интерактив: Школа Гуммерта ─────────────────────────────────────

    let GUMMERT_CONFIG = { kicker: '', title: '', desc: '', restartBtnText: '', questions: {}, ends: {} };

    function parseGummertConfig(md) {
      const cfg = { kicker: '', title: '', desc: '', continueBtnText: 'Дальше', restartBtnText: 'Попробовать ещё раз', questions: {} };
      const lines = md.split('\n');
      let section = 'meta';
      let currentObj = null;

      const field = (line, key) => {
        const prefix = `**${key}:**`;
        return line.startsWith(prefix) ? line.slice(prefix.length).trim() : null;
      };

      for (const raw of lines) {
        const line = raw.replace(/\r$/, '');
        const qMatch = line.match(/^## Вопрос (\S+)/);
        if (qMatch) {
          currentObj = { text: '', yesLabel: '', noLabel: '', yesReactionTitle: '', yesReaction: '', yesNext: null, noReactionTitle: '', noReaction: '' };
          cfg.questions[qMatch[1]] = currentObj;
          section = 'question';
          continue;
        }
        if (section === 'meta') {
          if (field(line, 'kicker') !== null) { cfg.kicker = field(line, 'kicker'); continue; }
          if (field(line, 'title') !== null) { cfg.title = field(line, 'title'); continue; }
          if (field(line, 'desc') !== null) { cfg.desc = field(line, 'desc'); continue; }
          if (field(line, 'continue-btn') !== null) { cfg.continueBtnText = field(line, 'continue-btn'); continue; }
          if (field(line, 'restart-btn') !== null) { cfg.restartBtnText = field(line, 'restart-btn'); continue; }
        }
        if (section === 'question' && currentObj) {
          if (field(line, 'text') !== null) { currentObj.text = field(line, 'text'); continue; }
          if (field(line, 'yes-label') !== null) { currentObj.yesLabel = field(line, 'yes-label'); continue; }
          if (field(line, 'no-label') !== null) { currentObj.noLabel = field(line, 'no-label'); continue; }
          if (field(line, 'yes-reaction-title') !== null) { currentObj.yesReactionTitle = field(line, 'yes-reaction-title'); continue; }
          if (field(line, 'yes-reaction') !== null) { currentObj.yesReaction = field(line, 'yes-reaction'); continue; }
          if (field(line, 'yes-next') !== null) { currentObj.yesNext = field(line, 'yes-next'); continue; }
          if (field(line, 'no-reaction-title') !== null) { currentObj.noReactionTitle = field(line, 'no-reaction-title'); continue; }
          if (field(line, 'no-reaction') !== null) { currentObj.noReaction = field(line, 'no-reaction'); continue; }
        }
      }
      return cfg;
    }

    // phase: 'question' | 'reaction'
    // reactionTitle, reactionText, nextQuestion (null = dead end, показываем restart)
    let gummertState = { phase: 'question', question: 'q1', reactionTitle: '', reactionText: '', nextQuestion: null };

    function gummertAnswer(choice) {
      const cfg = GUMMERT_CONFIG;
      const q = cfg.questions[gummertState.question];
      if (!q) return;
      const title   = choice === 'yes' ? q.yesReactionTitle : q.noReactionTitle;
      const text    = choice === 'yes' ? q.yesReaction      : q.noReaction;
      const next    = choice === 'yes' ? q.yesNext          : null;
      gummertState = { phase: 'reaction', question: gummertState.question, reactionTitle: title, reactionText: text, nextQuestion: next };
      renderGummert();
    }

    function gummertContinue() {
      gummertState = { phase: 'question', question: gummertState.nextQuestion, reactionTitle: '', reactionText: '', nextQuestion: null };
      renderGummert();
    }

    function gummertRestart() {
      gummertState = { phase: 'question', question: 'q1', reactionTitle: '', reactionText: '', nextQuestion: null };
      renderGummert();
    }

    function buildGummertHtml() {
      const cfg = GUMMERT_CONFIG;
      const head = `
        <div class="im-gummert-head">
          <div class="im-gummert-kicker">${escapeHtml(cfg.kicker)}</div>
          <div class="im-gummert-title">${escapeHtml(cfg.title)}</div>
          <div class="im-gummert-desc">${escapeHtml(cfg.desc)}</div>
        </div>
      `;

      if (gummertState.phase === 'question') {
        const q = cfg.questions[gummertState.question];
        if (!q) return head;
        return head + `
          <div class="im-gummert-body">
            <div class="im-gummert-question">${escapeHtml(q.text)}</div>
            <div class="im-gummert-btn-row">
              <button class="im-gummert-btn" onclick="gummertAnswer('yes')">${escapeHtml(q.yesLabel)}</button>
              <button class="im-gummert-btn" onclick="gummertAnswer('no')">${escapeHtml(q.noLabel)}</button>
            </div>
          </div>
        `;
      }

      // phase === 'reaction'
      const isEnd = gummertState.nextQuestion === null;
      const actionBtn = isEnd
        ? `<button class="im-gummert-restart-btn" onclick="gummertRestart()">${escapeHtml(cfg.restartBtnText)}</button>`
        : `<button class="im-gummert-btn" onclick="gummertContinue()">${escapeHtml(cfg.continueBtnText)}</button>`;

      return head + `
        <div class="im-gummert-end">
          <div class="im-gummert-end-title">${escapeHtml(gummertState.reactionTitle)}</div>
          <div class="im-gummert-end-text">${escapeHtml(gummertState.reactionText)}</div>
          ${actionBtn}
        </div>
      `;
    }

    function renderGummert() {
      const el = document.getElementById('interactive-gummert');
      if (!el) return;
      el.innerHTML = buildGummertHtml();
    }

    // ── Интерактив: Моң есть или нет? ──────────────────────────────────
    // Всё редактируемое содержимое — в interactive-mong.md

    let MONG_CONFIG = { kicker: '', title: '', desc: '', chooseBtnText: '', nextBtnText: '', finishBtnText: '', chosenNoteA: '', chosenNoteB: '', chosenExplanation: '', revealTitle: '', revealText: '', restartBtnText: '', rounds: [] };

    function parseMongConfig(md) {
      const lines = md.split('\n');
      const cfg = { kicker: '', title: '', desc: '', chooseBtnText: 'Вот этот', nextBtnText: 'Следующий раунд →', finishBtnText: 'Узнать результат →', chosenNoteA: '', chosenNoteB: '', revealTitle: '', revealText: '', restartBtnText: '', rounds: [] };
      let section = 'meta';
      let round = null;

      const field = (line, key) => {
        const prefix = `**${key}:**`;
        if (line.startsWith(prefix)) return line.slice(prefix.length).trim();
        return null;
      };

      for (const raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('## Финал')) { section = 'reveal'; round = null; continue; }
        if (/^## Раунд \d+/.test(line)) { round = { prompt: '', a: {}, b: {} }; cfg.rounds.push(round); section = 'round'; continue; }

        if (section === 'meta') {
          if (field(line, 'kicker') !== null) { cfg.kicker = field(line, 'kicker'); continue; }
          if (field(line, 'title') !== null) { cfg.title = field(line, 'title'); continue; }
          if (field(line, 'desc') !== null) { cfg.desc = field(line, 'desc'); continue; }
          if (field(line, 'choose-btn') !== null) { cfg.chooseBtnText = field(line, 'choose-btn'); continue; }
          if (field(line, 'next-btn') !== null) { cfg.nextBtnText = field(line, 'next-btn'); continue; }
          if (field(line, 'finish-btn') !== null) { cfg.finishBtnText = field(line, 'finish-btn'); continue; }
          if (field(line, 'chosen-note-a') !== null) { cfg.chosenNoteA = field(line, 'chosen-note-a'); continue; }
          if (field(line, 'chosen-note-b') !== null) { cfg.chosenNoteB = field(line, 'chosen-note-b'); continue; }
          if (field(line, 'chosen-explanation') !== null) { cfg.chosenExplanation = field(line, 'chosen-explanation'); continue; }
        }
        if (section === 'reveal') {
          if (field(line, 'title') !== null) { cfg.revealTitle = field(line, 'title'); continue; }
          if (field(line, 'text') !== null) { cfg.revealText = field(line, 'text'); continue; }
          if (field(line, 'restart-btn') !== null) { cfg.restartBtnText = field(line, 'restart-btn'); continue; }
        }
        if (section === 'round' && round) {
          if (field(line, 'prompt') !== null) { round.prompt = field(line, 'prompt'); continue; }
          if (field(line, 'choose-btn-a') !== null) { round.chooseBtnA = field(line, 'choose-btn-a'); continue; }
          if (field(line, 'choose-btn-b') !== null) { round.chooseBtnB = field(line, 'choose-btn-b'); continue; }
          if (field(line, 'chosen-note-a') !== null) { round.chosenNoteA = field(line, 'chosen-note-a'); continue; }
          if (field(line, 'chosen-note-b') !== null) { round.chosenNoteB = field(line, 'chosen-note-b'); continue; }
          if (field(line, 'chosen-explanation') !== null) { round.chosenExplanation = field(line, 'chosen-explanation'); continue; }
          if (field(line, 'next-btn') !== null) { round.nextBtnText = field(line, 'next-btn'); continue; }
          if (field(line, 'a-youtube') !== null) { round.a.youtubeId = field(line, 'a-youtube'); continue; }
          if (field(line, 'a-start') !== null) { round.a.start = parseInt(field(line, 'a-start'), 10); continue; }
          if (field(line, 'a-end') !== null) { round.a.end = parseInt(field(line, 'a-end'), 10); continue; }
          if (field(line, 'a-label') !== null) { round.a.label = field(line, 'a-label'); continue; }
          if (field(line, 'b-youtube') !== null) { round.b.youtubeId = field(line, 'b-youtube'); continue; }
          if (field(line, 'b-start') !== null) { round.b.start = parseInt(field(line, 'b-start'), 10); continue; }
          if (field(line, 'b-end') !== null) { round.b.end = parseInt(field(line, 'b-end'), 10); continue; }
          if (field(line, 'b-label') !== null) { round.b.label = field(line, 'b-label'); continue; }
        }
      }
      return cfg;
    }

    let mongState = { round: 0, chosen: null, done: false };

    function mongChoose(choice) {
      if (mongState.chosen !== null) return;
      mongState.chosen = choice;
      renderMong();
    }

    function mongNext() {
      mongState.round += 1;
      mongState.chosen = null;
      if (mongState.round >= MONG_CONFIG.rounds.length) mongState.done = true;
      renderMong();
    }

    function mongRestart() {
      mongState = { round: 0, chosen: null, done: false };
      renderMong();
    }

    function mongYtSrc(clip) {
      const raw = String(clip.youtubeId).trim();
      const m = raw.match(/(?:youtu\.be\/|[?&]v=|embed\/)([a-zA-Z0-9_-]{11})/);
      const id = m ? m[1] : (/^[a-zA-Z0-9_-]{11}$/.test(raw) ? raw : raw);
      return `https://www.youtube.com/embed/${id}?start=${clip.start}&end=${clip.end}&rel=0`;
    }

    function buildMongHtml() {
      const cfg = MONG_CONFIG;
      const head = `
        <div class="im-mong-head">
          <div class="im-mong-kicker">${escapeHtml(cfg.kicker)}</div>
          <div class="im-mong-title">${escapeHtml(cfg.title)}</div>
          <div class="im-mong-desc">${escapeHtml(cfg.desc)}</div>
        </div>
      `;

      if (mongState.done) {
        return head + `
          <div class="im-mong-reveal">
            <div class="im-mong-reveal-icon"><img src="starling.png" alt="🐦" width="48" height="48"></div>
            <div class="im-mong-reveal-title">${escapeHtml(cfg.revealTitle)}</div>
            <div class="im-mong-reveal-text">${escapeHtml(cfg.revealText)}</div>
            <button class="im-mong-restart-btn" onclick="mongRestart()">${escapeHtml(cfg.restartBtnText)}</button>
          </div>
        `;
      }

      const r = cfg.rounds[mongState.round];
      const chosen = mongState.chosen;
      const isLast = mongState.round + 1 >= cfg.rounds.length;

      // Значения раунда с фолбеком на глобальные
      const chooseBtnA       = r.chooseBtnA       ?? cfg.chooseBtnText;
      const chooseBtnB       = r.chooseBtnB       ?? cfg.chooseBtnText;
      const chosenNoteA      = r.chosenNoteA      ?? cfg.chosenNoteA;
      const chosenNoteB      = r.chosenNoteB      ?? cfg.chosenNoteB;
      const chosenExpl       = r.chosenExplanation ?? cfg.chosenExplanation;
      const nextBtn          = r.nextBtnText      ?? (isLast ? cfg.finishBtnText : cfg.nextBtnText);

      if (chosen !== null) {
        return head + `
          <div class="im-mong-chosen-screen">
            <div class="im-mong-chosen-heading">${escapeHtml(chosen === 'a' ? chosenNoteA : chosenNoteB)}</div>
            <div class="im-mong-chosen-explanation">${escapeHtml(chosenExpl)}</div>
            <button class="im-mong-next-btn" onclick="mongNext()">${escapeHtml(nextBtn)}</button>
          </div>
        `;
      }

      return head + `
        <div class="im-mong-body">
          <div class="im-mong-round-label">Раунд ${mongState.round + 1} из ${cfg.rounds.length}</div>
          <div class="im-mong-prompt">${escapeHtml(r.prompt)}</div>
          <div class="im-mong-options">
            <div class="im-mong-option">
              <iframe src="${mongYtSrc(r.a)}" title="${escapeHtml(r.a.label)}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
              ${r.a.label ? `<div class="im-mong-option-label">${escapeHtml(r.a.label)}</div>` : ''}
              <button class="im-mong-choose-btn" onclick="mongChoose('a')">${escapeHtml(chooseBtnA)}</button>
            </div>
            <div class="im-mong-option">
              <iframe src="${mongYtSrc(r.b)}" title="${escapeHtml(r.b.label)}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
              ${r.b.label ? `<div class="im-mong-option-label">${escapeHtml(r.b.label)}</div>` : ''}
              <button class="im-mong-choose-btn" onclick="mongChoose('b')">${escapeHtml(chooseBtnB)}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderMong() {
      const el = document.getElementById('interactive-mong');
      if (!el) return;
      el.innerHTML = buildMongHtml();
    }
  </script>
</body>
</html>
