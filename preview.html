<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музыкальная жизнь Казани — превью</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #f8f4ec;
      --text: #171717;
      --muted: #7b7368;
      --line: #d7cfc2;
      --card: #fbf8f2;
      --shadow: rgba(40, 30, 20, 0.06);
      --link: #295ea8;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    a { color: var(--link); text-decoration: none; border-bottom: 1px solid rgba(41,94,168,.28); }
    a:hover { border-bottom-color: rgba(41,94,168,.8); }
    .page {
      width: min(1200px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 40px 0 96px;
      position: relative;
    }
    .intro {
      max-width: 760px;
      margin: 0 0 48px 120px;
    }
    .eyebrow {
      font: 12px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    h1 {
      font-size: clamp(34px, 5vw, 68px);
      line-height: .98;
      margin: 0 0 16px;
      font-weight: 700;
    }
    .lead {
      font-size: 18px;
      color: #3d3934;
      max-width: 680px;
      margin: 0 0 12px;
    }
    .helper {
      font: 13px/1.45 Arial, sans-serif;
      color: var(--muted);
    }
    .timeline {
      position: relative;
      margin-left: 120px;
      padding-right: 180px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--line);
    }
    .chapter {
      position: relative;
      padding: 0 0 44px 0;
      min-height: 64px;
    }
    .chapter-anchor {
      position: absolute;
      left: 0;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--paper);
      display: grid;
      place-items: center;
      font: 12px/1 Arial, sans-serif;
      color: var(--muted);
      z-index: 2;
    }
    .chapter-date {
      position: absolute;
      left: calc(100% + 56px);
      top: 10px;
      width: 270px;
      padding-left: 20px;
      text-align: left;
      font: 14px/1.35 Arial, sans-serif;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .chapter-date::before {
      content: "";
      position: absolute;
      left: 0;
      top: -10px;
      bottom: -14px;
      width: 1px;
      background: var(--line);
    }
    .date-track {
      display: grid;
      gap: 14px;
    }
    .date-era {
      font: 13px/1.2 Arial, sans-serif;
      letter-spacing: .12em;
      color: #8a8176;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .date-group {
      display: grid;
      gap: 9px;
      padding: 12px 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(215,207,194,.85);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(40,30,20,.04);
    }
    .date-group-label {
      font: 11px/1.2 Arial, sans-serif;
      letter-spacing: .14em;
      color: #8a8176;
      text-transform: uppercase;
    }
    .date-item {
      font: 14px/1.38 Arial, sans-serif;
      text-transform: none;
      letter-spacing: 0;
      color: #4f483f;
    }
    .date-item strong {
      font-weight: 700;
      color: #2f2a24;
    }
    .chapter-body {
      margin-left: 72px;
      max-width: 760px;
    }
    .chapter-title {
      position: absolute;
      left: -210px;
      top: 6px;
      width: 180px;
      font-size: 25px;
      line-height: 1.18;
      margin: 0;
      font-weight: 600;
      color: #2d2924;
    }
    .blocks { display: grid; gap: 14px; }
    .media-strip {
      display: grid;
      gap: 12px;
      margin: 18px 0 18px;
    }
    .media-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .media-card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .media-caption {
      padding: 10px 12px 12px;
      font: 12px/1.35 Arial, sans-serif;
      color: #6b6258;
    }
    .media-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .doc-card {
      padding: 14px;
      background: #f3eee4;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .doc-label {
      font: 10px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .doc-title {
      font-size: 18px;
      line-height: 1.2;
      margin: 0 0 10px;
      font-weight: 700;
    }
    .doc-text {
      font: 14px/1.45 Arial, sans-serif;
      color: #4d453b;
    }
    .video-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.76);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .video-frame {
      aspect-ratio: 16 / 9;
      width: 100%;
      border: 0;
      display: block;
    }
    details.block {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }
    details.block[open] { background: #fffaf2; }
    details.block summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 22px 20px;
      position: relative;
    }
    details.block summary::-webkit-details-marker { display: none; }
    .block-kicker {
      font: 11px/1.2 Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .block-main {
      font-size: 18px;
      color: #24211d;
      margin: 0;
      white-space: normal;
    }
    .toggle {
      position: absolute;
      right: 18px;
      top: 20px;
      font: 22px/1 Arial, sans-serif;
      color: var(--muted);
      background: transparent;
      border: 0;
      width: auto;
      height: auto;
    }
    details[open] .toggle { transform: rotate(180deg); }
    .expand {
      border-top: 1px solid var(--line);
      padding: 18px 22px 22px;
      background: rgba(255,255,255,.45);
    }
    .expand p { margin: 0; font-size: 17px; white-space: normal; }
    .markdown p { margin: 0 0 10px; }
    .markdown p:last-child { margin-bottom: 0; }
    .error {
      margin-left: 72px;
      padding: 16px 18px;
      background: #fff0ee;
      border: 1px solid #e6b8b1;
      border-radius: 12px;
      color: #7f2a1d;
      font-family: Arial, sans-serif;
    }
    @media (max-width: 920px) {
      .page { width: min(100vw - 24px, 900px); padding-top: 24px; }
      .intro, .timeline { margin-left: 0; padding-right: 0; }
      .timeline::before { left: 14px; }
      .chapter-body { margin-left: 48px; max-width: none; }
      .chapter-title {
        position: static;
        width: auto;
        font-size: clamp(20px, 5.4vw, 30px);
        margin: 0 0 16px;
      }
      .chapter-date {
        position: static;
        width: auto;
        margin: 0 0 12px 48px;
        padding-left: 0;
      }
      .chapter-date::before { display: none; }
      .media-grid-2 { grid-template-columns: 1fr; }
      .error { margin-left: 48px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro">
      <div class="eyebrow">Черновой интерактив</div>
      <h1>Музыкальная жизнь Казани</h1>
      <p class="lead">Рассказываем об основных именах и событиях в казанской музыке за последние 150 лет. Жмите на кнопки, играйте в игры и узнавайте, чем жил город — от фольклора и оперы до рэпа.</p>
    </section>

    <section class="timeline" id="timeline"></section>
  </main>

  <script>
    let sidebarDatesByChapter = {};
    let mediaPlacementByChapter = {};

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function inlineMarkdownToHtml(text) {
      let html = escapeHtml(text);
      html = html.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a target="_blank" rel="noreferrer" href="$2">$1</a>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return html;
    }

    function blockTextToHtml(text) {
      return text
        .split(/\n\s*\n/)
        .map(p => `<p>${inlineMarkdownToHtml(p.trim())}</p>`)
        .join('');
    }

    function stripMarkdown(text) {
      return text
        .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '$1')
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .trim();
    }

    function deriveBlockTitle(block) {
      if (block.title && block.title.trim()) return block.title.trim();
      const plain = stripMarkdown(block.main.replace(/\n+/g, ' '));
      if (!plain) return block.kicker || 'Фрагмент';
      const sentence = plain.match(/^(.{1,90}?[.!?])(\s|$)/);
      if (sentence) return sentence[1].trim();
      return plain.slice(0, 90).trim() + (plain.length > 90 ? '…' : '');
    }

    function parseSidebarDates(md) {
      const lines = md.split('\n');
      const result = {};
      let currentChapter = null;
      let currentGroup = null;

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          currentChapter = title;
          result[currentChapter] = { era: '', Татарские: [], Русские: [], Россия: [], СССР: [], Мир: [] };
          currentGroup = null;
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('Эпоха:')) {
          result[currentChapter].era = line.replace('Эпоха:', '').trim();
          continue;
        }
        if (line.startsWith('## ')) {
          currentGroup = line.slice(3).trim();
          continue;
        }
        if (line.startsWith('- **') && currentGroup && result[currentChapter]) {
          result[currentChapter][currentGroup]?.push(line.slice(2).trim());
        }
      }

      return result;
    }

    function parseMediaPlacement(md) {
      const lines = md.split('\n');
      const result = {};
      let currentChapter = null;
      let currentItem = null;
      let currentItemsList = null;

      const finishItem = () => {
        if (!currentChapter || !currentItem) return;
        if (!result[currentChapter]) result[currentChapter] = [];
        result[currentChapter].push(currentItem);
        currentItem = null;
        currentItemsList = null;
      };

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          finishItem();
          currentChapter = title;
          if (!result[currentChapter]) result[currentChapter] = [];
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('- **position:**')) {
          finishItem();
          currentItem = { position: line.split('**position:**')[1].trim(), type: '', src: '', caption: '', items: [] };
          continue;
        }
        if (!currentItem) continue;
        if (line.includes('**type:**')) {
          currentItem.type = line.split('**type:**')[1].trim();
          continue;
        }
        if (line.includes('**src:**')) {
          currentItem.src = line.split('**src:**')[1].trim().replace(/^`|`$/g, '');
          continue;
        }
        if (line.includes('**caption:**')) {
          currentItem.caption = line.split('**caption:**')[1].trim();
          continue;
        }
        if (line.includes('**block:**')) {
          currentItem.block = line.split('**block:**')[1].trim();
          continue;
        }
        if (line.includes('**items:**')) {
          currentItemsList = currentItem.items;
          continue;
        }
        if (currentItemsList && line.trim().startsWith('- `')) {
          currentItemsList.push(line.trim().slice(3, -1));
          continue;
        }
      }

      finishItem();
      return result;
    }

    function parseMarkdown(md) {
      const lines = md.split('\n');
      const chapters = [];
      let currentChapter = null;
      let currentBlock = null;
      let mode = null;

      const flushBlock = () => {
        if (!currentBlock || !currentChapter) return;
        currentBlock.main = currentBlock.main.join('\n').trim();
        currentBlock.expand = currentBlock.expand.join('\n').trim();
        currentBlock.title = deriveBlockTitle(currentBlock);
        currentChapter.blocks.push(currentBlock);
        currentBlock = null;
      };

      const flushChapter = () => {
        flushBlock();
        if (currentChapter) chapters.push(currentChapter);
        currentChapter = null;
      };

      for (let raw of lines) {
        const line = raw.replace(/\r$/, '');
        if (line.startsWith('# ')) {
          const title = line.slice(2).trim();
          if (!/^\d+\./.test(title)) continue;
          flushChapter();
          currentChapter = { title, blocks: [] };
          mode = null;
          continue;
        }
        if (!currentChapter) continue;
        if (line.startsWith('## ')) {
          flushBlock();
          currentBlock = { kicker: line.slice(3).trim(), title: '', main: [], expand: [] };
          mode = null;
          continue;
        }
        if (!currentBlock) continue;
        if (line.startsWith('### ')) {
          currentBlock.title = line.slice(4).trim();
          mode = 'main';
          continue;
        }
        if (line.startsWith('**Разворот:**')) {
          mode = 'expand';
          const rest = line.replace('**Разворот:**', '').trim();
          if (rest) currentBlock.expand.push(rest);
          continue;
        }
        if (line.trim() === '---') continue;
        if (mode === 'expand') currentBlock.expand.push(line);
        else if (mode === 'main') currentBlock.main.push(line);
      }

      flushChapter();
      return chapters;
    }

    function renderDateTrack(chapterTitle) {
      const groups = sidebarDatesByChapter[chapterTitle] || {};
      const order = ['Татарские', 'Россия', 'СССР', 'Мир'];
      return `
        <div class="date-track">
          <div class="date-era">${escapeHtml((groups && groups.era) || '')}</div>
          ${order.map(groupName => {
            const items = groups[groupName] || [];
            if (!items.length) return '';
            return `
              <div class="date-group">
                <div class="date-group-label">${escapeHtml(groupName)}</div>
                ${items.map(item => `<div class="date-item">${inlineMarkdownToHtml(item)}</div>`).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderMediaItem(item) {
      if (!item) return '';
      if (item.type === 'image') {
        return `
          <div class="media-strip">
            <figure class="media-card">
              <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.block || 'Изображение')}" loading="lazy">
              <figcaption class="media-caption">${escapeHtml(item.caption || '')}</figcaption>
            </figure>
          </div>
        `;
      }
      if (item.type === 'youtube') {
        return `
          <div class="media-strip">
            <div class="video-card">
              <iframe class="video-frame" src="${escapeHtml(item.src)}" title="${escapeHtml(item.block || 'Видео')}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
              <div class="media-caption">${escapeHtml(item.caption || '')}</div>
            </div>
          </div>
        `;
      }
      if (item.type === 'image-grid') {
        return `
          <div class="media-strip">
            <div class="media-grid-2">
              ${(item.items || []).map(src => `
                <figure class="media-card">
                  <img src="${escapeHtml(src)}" alt="Архивный материал" loading="lazy">
                </figure>
              `).join('')}
            </div>
            ${item.caption ? `<div class="media-caption">${escapeHtml(item.caption)}</div>` : ''}
          </div>
        `;
      }
      return '';
    }

    function renderInlineMedia(chapterTitle, position) {
      const items = mediaPlacementByChapter[chapterTitle] || [];
      return items.filter(item => item.position === position).map(renderMediaItem).join('');
    }

    function render(chapters) {
      const root = document.getElementById('timeline');
      root.innerHTML = chapters.map((chapter, idx) => `
        <article class="chapter">
          <div class="chapter-anchor">${idx + 1}</div>
          <div class="chapter-date">${renderDateTrack(chapter.title)}</div>
          <h2 class="chapter-title">${escapeHtml(chapter.title.replace(/^\d+\.\s*/, ''))}</h2>
          <div class="chapter-body">
            ${renderInlineMedia(chapter.title, 'before-blocks')}
            <div class="blocks">
              ${chapter.blocks.map((block, blockIdx) => `
                <details class="block">
                  <summary>
                    <div class="block-kicker">${escapeHtml(block.title || '')}</div>
                    <div class="block-main markdown">${blockTextToHtml(block.main)}</div>
                    <span class="toggle">⌄</span>
                  </summary>
                  <div class="expand">
                    <div class="markdown">${blockTextToHtml(block.expand || '')}</div>
                  </div>
                </details>
                ${renderInlineMedia(chapter.title, `after-block-${blockIdx}`)}
              `).join('')}
            </div>
          </div>
        </article>
      `).join('');
    }

    async function init() {
      try {
        const [textRes, datesRes, mediaRes] = await Promise.all([
          fetch('./text-draft.md', { cache: 'no-store' }),
          fetch('./chapter-sidebar-dates.md', { cache: 'no-store' }),
          fetch('./media-placement.md', { cache: 'no-store' })
        ]);
        if (!textRes.ok) throw new Error(`text-draft HTTP ${textRes.status}`);
        if (!datesRes.ok) throw new Error(`chapter-sidebar-dates HTTP ${datesRes.status}`);
        if (!mediaRes.ok) throw new Error(`media-placement HTTP ${mediaRes.status}`);
        const md = await textRes.text();
        const datesMd = await datesRes.text();
        const mediaMd = await mediaRes.text();
        sidebarDatesByChapter = parseSidebarDates(datesMd);
        mediaPlacementByChapter = parseMediaPlacement(mediaMd);
        const chapters = parseMarkdown(md);
        render(chapters);
      } catch (err) {
        document.getElementById('timeline').innerHTML = `<div class="error">Не удалось загрузить проектные markdown-файлы. Скорее всего, страницу открыли как file:// и браузер заблокировал fetch. Подними локальный сервер в папке проекта и открой страницу через localhost.</div>`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
